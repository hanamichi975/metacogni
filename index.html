function norm(it,raw){if(raw===undefined||raw===null)return null;switch(it.input){case"rating":return typeof raw==="number"?raw:null;case"scale5":return typeof raw==="number"?((raw-1)/4)*2:null;case"percent":return typeof raw==="number"?(raw/100)*2:null;case"text":return(typeof raw==="string"&&raw.trim().length>0)?2:0;case"strategy":return(Array.isArray(raw)&&raw.length>0)?2:0;default:return null;}}
function answered(it,raw){if(raw===undefined||raw===null)return false;switch(it.input){case"rating":case"scale5":case"percent":return typeof raw==="number";case"text":return typeof raw==="string"&&raw.trim().length>0;case"strategy":return Array.isArray(raw)&&raw.length>0;default:return false;}}

function showToast(msg,type){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className="toast show "+(type||"");
  clearTimeout(window.__toastTimer);
  window.__toastTimer=setTimeout(()=>{t.className="toast"},3200);
}

/* ═══════════ CHARTS ═══════════ */
function Radar({data,size=280}){
  const cx=size/2,cy=size/2,r=size*.38,cats=Object.keys(data),n=cats.length,step=(2*Math.PI)/n;
  const pt=(i,v)=>{const a=step*i-Math.PI/2;return{x:cx+r*v*Math.cos(a),y:cy+r*v*Math.sin(a)};};
  if(n<3)return null;
  return React.createElement("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`,style:{display:"block",margin:"0 auto"}},
    [.25,.5,.75,1].map(lv=>React.createElement("polygon",{key:lv,points:cats.map((_,i)=>{const p=pt(i,lv);return`${p.x},${p.y}`;}).join(" "),fill:"none",stroke:"#334155",strokeWidth:1})),
    cats.map((_,i)=>{const p=pt(i,1);return React.createElement("line",{key:"l"+i,x1:cx,y1:cy,x2:p.x,y2:p.y,stroke:"#334155",strokeWidth:1});}),
    React.createElement("polygon",{points:cats.map((c,i)=>{const p=pt(i,data[c]);return`${p.x},${p.y}`;}).join(" "),fill:"rgba(99,102,241,.2)",stroke:"#6366F1",strokeWidth:2.5}),
    cats.map((c,i)=>{const p=pt(i,data[c]),lp=pt(i,1.25);return React.createElement("g",{key:"g"+i},
      React.createElement("circle",{cx:p.x,cy:p.y,r:5,fill:"#6366F1",stroke:"#1e293b",strokeWidth:2}),
      React.createElement("text",{x:lp.x,y:lp.y,textAnchor:"middle",dominantBaseline:"middle",style:{fontSize:"11px",fontWeight:700,fill:"#94a3b8"}},c));})
  );
}

/* 누적 점수 추세선: points = [0~100 점수 배열] (오래된 → 최근 순) */
function TrendLine({points,labels,width=460,height=160}){
  if(!points||points.length===0)return null;
  const padL=28,padR=16,padT=14,padB=24,w=width-padL-padR,h=height-padT-padB;
